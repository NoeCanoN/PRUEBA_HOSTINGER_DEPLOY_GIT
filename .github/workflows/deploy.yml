name: Deploy Laravel + Vue Project

on:
  push:
    branches: [ main ]

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install NPM dependencies & Build Vue
      run: |
        npm install
        npm run build

    - name: 📂 Sync files to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftp
        timeout: 60000
        # NOTA: Asegúrate de que esta sea la ruta correcta de tu proyecto en Hostinger.
        # Si tu proyecto está en una carpeta dentro de public_html, ej. /public_html/clubnutricional/, cámbialo aquí.
        server-dir: /public_html/
        # Excluimos directorios locales/remotos para evitar que la acción de FTP
        # borre cosas críticas en Hostinger (como vendor, storage, .env, etc.)
        exclude: |
          **/.git*
          **/.git*/**
          **/.github*/**
          **/node_modules/**
          **/vendor/**
          **/storage/**
          **/.env
          **/tests/**
